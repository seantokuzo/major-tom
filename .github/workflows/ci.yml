name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Relay Server — Lint
  # =============================================================================
  lint-relay:
    name: Lint (Relay)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # =============================================================================
  # Relay Server — Typecheck
  # =============================================================================
  typecheck-relay:
    name: Typecheck (Relay)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  # =============================================================================
  # Relay Server — Tests
  # =============================================================================
  test-relay:
    name: Test (Relay)
    runs-on: ubuntu-latest
    needs: [lint-relay, typecheck-relay]
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test

  # =============================================================================
  # Relay Server — Build
  # =============================================================================
  build-relay:
    name: Build (Relay)
    runs-on: ubuntu-latest
    needs: [lint-relay, typecheck-relay]
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # =============================================================================
  # VSCode Extension — Lint + Typecheck + Build
  # NOTE: Disabled until vscode-extension is scaffolded. Enable when package.json exists.
  # =============================================================================
  # build-extension:
  #   name: Build (VSCode Extension)
